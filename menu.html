<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore the diverse and authentic menu of RK Restaurant. From our signature Biryanis to traditional Andhra curries.">
    <meta property="og:title" content="Menu | RK Restaurant">
    <meta property="og:description" content="Discover the legendary flavors of Rajahmundry at RK Restaurant.">
    <meta property="og:image" content="spread.png">
    <title>Menu | RK Restaurant</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="container nav">
            <div class="logo"><a href="index.html"><img src="rklogo.png" alt="RK Restaurant Logo"></a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </header>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </a>
        <a href="menu.html" class="bottom-nav-item active">
            <svg viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
            <span>Menu</span>
        </a>
        <a href="contact.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            <span>Contact</span>
        </a>
    </nav>

    <main class="container" style="padding-top: 80px;">
        <div class="section-title" style="margin-bottom: 30px;">
            <h2 style="font-size: 2.2rem;">Our Menu</h2>
            <p>Legendary flavors, curated for you.</p>
        </div>

        <div class="search-container" style="max-width: 500px; margin: 0 auto 25px; position: relative;">
            <input type="text" id="menu-search" placeholder="Search for your favorite dish..." style="width: 100%; padding: 18px 25px 18px 60px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 50px; color: var(--text-light); font-family: var(--font-body); font-size: 1.1rem; outline: none; transition: 0.3s;">
            <svg style="position: absolute; left: 22px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; fill: var(--royal-gold); opacity: 0.7;" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>

        <div class="menu-controls">
            <button class="filter-btn active" data-category="all">All Items</button>
            <button class="filter-btn" data-category="biryani">Biryani</button>
            <button class="filter-btn" data-category="veg_starters">Veg Starters</button>
            <button class="filter-btn" data-category="non_veg_starters">Non-Veg Starters</button>
            <button class="filter-btn" data-category="veg_curries">Veg Curries</button>
            <button class="filter-btn" data-category="non_veg_curries">Non-Veg Curries</button>
        </div>

        <div id="menu-grid" class="menu-grid">
            <!-- Items rendered by script.js -->
        </div>
    </main>

    <footer>
        <div class="container text-center">
            <div class="footer-logo"><img src="rklogo.png" alt="RK Restaurant Logo"></div>
            <p>&copy; 2026 RK Restaurant. All rights reserved.</p>
            <a href="mailto:srinarendraofficial@gmail.com" class="footer-credit">MADE BY SRI</a>
        </div>
    </footer>
</body>
</html>
